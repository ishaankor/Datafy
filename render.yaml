services:
  - type: web
    name: datafy-chat-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node dist/server/server.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ALLOWED_ORIGIN
        sync: false
      - key: LOVABLE_API_KEY
        sync: false